services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-simuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-simpass}
      POSTGRES_DB: ${POSTGRES_DB:-sales_sim}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-simuser} -d ${POSTGRES_DB:-sales_sim}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-simuser}:${POSTGRES_PASSWORD:-simpass}@postgres:5432/${POSTGRES_DB:-sales_sim}
      CHROMA_PERSIST_DIR: /data/chroma
      UPLOAD_DIR: /data/uploads
    volumes:
      - chroma_data:/data/chroma
      - upload_data:/data/uploads
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
        NEXT_PUBLIC_WS_URL: ws://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  chroma_data:
  upload_data:
